<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f3f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quran Reflect" />

    <title>Quran Reflect — Your Personal Tadabbur Journal</title>
    <meta
      name="description"
      content="A privacy-first, mobile-first Progressive Web App that lets you select Quranic verses, read the Arabic text alongside the Clear Quran English translation, and log personal reflections saved entirely on your device."
    />
    <meta name="keywords" content="Quran, Tadabbur, reflection, Islamic journal, Clear Quran, privacy" />

    <!-- Open Graph -->
    <meta property="og:title" content="Quran Reflect — Your Personal Tadabbur Journal" />
    <meta property="og:description" content="Select verses, read Arabic + Clear Quran translation, and save personal reflections — all stored privately on your device." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quranreflect.app/" />
    <meta property="og:image" content="/quran-reflect-social.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quran Reflect — Your Personal Tadabbur Journal" />
    <meta name="twitter:description" content="Select verses, read Arabic + Clear Quran translation, and save personal reflections — all stored privately on your device." />
    <meta name="twitter:image" content="/quran-reflect-social.png" />

    <!-- PWA Icons -->
    <link rel="apple-touch-icon" href="/pwa-192.png" />


    <!-- Fonts: preconnect first, then stylesheet — avoids render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap"
    />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <style>
      /* ── Design Token Surface Hierarchy ── */
      :root {
        --primary:            #00361a;
        --primary-container:  #1a4d2e;
        --primary-light:      rgba(26,77,46,0.07);
        --on-primary:         #ffffff;
        --surface:            #faf9f6;
        --surface-low:        #f4f3f1;
        --surface-lowest:     #ffffff;
        --on-surface:         #1a1c1a;
        --on-surface-variant: #4f5350;
        --outline-ghost:      rgba(193,201,191,0.15);
      }

      [data-theme="dark"] {
        --primary:            #4caf7d;
        --primary-container:  #2d6a4f;
        --primary-light:      rgba(76,175,125,0.1);
        --on-primary:         #001a0b;
        --surface:            #131510;
        --surface-low:        #1c1f1a;
        --surface-lowest:     #242722;
        --on-surface:         #e8e6e0;
        --on-surface-variant: #9e9e96;
        --outline-ghost:      rgba(100,110,100,0.18);
      }
      [data-theme="light"] {
        --primary:            #00361a;
        --primary-container:  #1a4d2e;
        --primary-light:      rgba(26,77,46,0.07);
        --on-primary:         #ffffff;
        --surface:            #faf9f6;
        --surface-low:        #f4f3f1;
        --surface-lowest:     #ffffff;
        --on-surface:         #1a1c1a;
        --on-surface-variant: #4f5350;
        --outline-ghost:      rgba(193,201,191,0.15);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme]) {
          --primary:            #4caf7d;
          --primary-container:  #2d6a4f;
          --primary-light:      rgba(76,175,125,0.1);
          --on-primary:         #001a0b;
          --surface:            #131510;
          --surface-low:        #1c1f1a;
          --surface-lowest:     #242722;
          --on-surface:         #e8e6e0;
          --on-surface-variant: #9e9e96;
          --outline-ghost:      rgba(100,110,100,0.18);
        }
      }

      /* ── Sacred Marble ── */
      [data-color-scheme="sacred-marble"] {
        --primary:            #D4AF37;
        --primary-container:  #C5A028;
        --primary-light:      rgba(212, 175, 55, 0.1);
        --on-primary:         #FFFFFF;
        --surface:            #FFFFFF;
        --surface-low:        #FDFBF7;
        --surface-lowest:     #FFFFFF;
        --on-surface:         #2C3E50;
        --on-surface-variant: #7F8C8D;
        --outline-ghost:      rgba(44, 62, 80, 0.15);
      }
      [data-color-scheme="sacred-marble"][data-theme="dark"] {
        --primary:            #E5C05C;
        --primary-container:  #D4AF37;
        --primary-light:      rgba(229, 192, 92, 0.1);
        --on-primary:         #121212;
        --surface:            #1E1E1E;
        --surface-low:        #121212;
        --surface-lowest:     #242424;
        --on-surface:         #F5F5F5;
        --on-surface-variant: #A6ACAF;
        --outline-ghost:      rgba(245, 245, 245, 0.15);
      }
      @media (prefers-color-scheme: dark) {
        [data-color-scheme="sacred-marble"]:not([data-theme="light"]) {
          --primary:            #E5C05C;
          --primary-container:  #D4AF37;
          --primary-light:      rgba(229, 192, 92, 0.1);
          --on-primary:         #121212;
          --surface:            #1E1E1E;
          --surface-low:        #121212;
          --surface-lowest:     #242424;
          --on-surface:         #F5F5F5;
          --on-surface-variant: #A6ACAF;
          --outline-ghost:      rgba(245, 245, 245, 0.15);
        }
      }

      /* ── Andalusian Courtyard ── */
      [data-color-scheme="andalusian"] {
        --primary:            #008080;
        --primary-container:  #006666;
        --primary-light:      rgba(0, 128, 128, 0.1);
        --on-primary:         #FFFFFF;
        --surface:            #FFFFFF;
        --surface-low:        #F0F8FF;
        --surface-lowest:     #FFFFFF;
        --on-surface:         #0D2B2B;
        --on-surface-variant: #4A6B6B;
        --outline-ghost:      rgba(13, 43, 43, 0.15);
      }
      [data-color-scheme="andalusian"][data-theme="dark"] {
        --primary:            #64FFDA;
        --primary-container:  #4CD9B8;
        --primary-light:      rgba(100, 255, 218, 0.1);
        --on-primary:         #0A192F;
        --surface:            #112240;
        --surface-low:        #0A192F;
        --surface-lowest:     #1E2E4E;
        --on-surface:         #E6F1FF;
        --on-surface-variant: #8892B0;
        --outline-ghost:      rgba(230, 241, 255, 0.15);
      }
      @media (prefers-color-scheme: dark) {
        [data-color-scheme="andalusian"]:not([data-theme="light"]) {
          --primary:            #64FFDA;
          --primary-container:  #4CD9B8;
          --primary-light:      rgba(100, 255, 218, 0.1);
          --on-primary:         #0A192F;
          --surface:            #112240;
          --surface-low:        #0A192F;
          --surface-lowest:     #1E2E4E;
          --on-surface:         #E6F1FF;
          --on-surface-variant: #8892B0;
          --outline-ghost:      rgba(230, 241, 255, 0.15);
        }
      }

      /* ── Fajr Glow ── */
      [data-color-scheme="fajr"] {
        --primary:            #E67E22;
        --primary-container:  #D35400;
        --primary-light:      rgba(230, 126, 34, 0.1);
        --on-primary:         #FFFFFF;
        --surface:            #FFFFFF;
        --surface-low:        #FFFCF5;
        --surface-lowest:     #FFFFFF;
        --on-surface:         #4A2311;
        --on-surface-variant: #8D6E63;
        --outline-ghost:      rgba(74, 35, 17, 0.15);
      }
      [data-color-scheme="fajr"][data-theme="dark"] {
        --primary:            #F5B041;
        --primary-container:  #F39C12;
        --primary-light:      rgba(245, 176, 65, 0.1);
        --on-primary:         #2C1E16;
        --surface:            #3E2723;
        --surface-low:        #2C1E16;
        --surface-lowest:     #4E342E;
        --on-surface:         #FFF3E0;
        --on-surface-variant: #D7CCC8;
        --outline-ghost:      rgba(255, 243, 224, 0.15);
      }
      @media (prefers-color-scheme: dark) {
        [data-color-scheme="fajr"]:not([data-theme="light"]) {
          --primary:            #F5B041;
          --primary-container:  #F39C12;
          --primary-light:      rgba(245, 176, 65, 0.1);
          --on-primary:         #2C1E16;
          --surface:            #3E2723;
          --surface-low:        #2C1E16;
          --surface-lowest:     #4E342E;
          --on-surface:         #FFF3E0;
          --on-surface-variant: #D7CCC8;
          --outline-ghost:      rgba(255, 243, 224, 0.15);
        }
      }

      /* ── Vibrant Medina ── */
      [data-color-scheme="medina"] {
        --primary:            #10B981;
        --primary-container:  #059669;
        --primary-light:      rgba(16, 185, 129, 0.1);
        --on-primary:         #FFFFFF;
        --surface:            #FFFFFF;
        --surface-low:        #F0FDF4;
        --surface-lowest:     #FFFFFF;
        --on-surface:         #064E3B;
        --on-surface-variant: #4B5563;
        --outline-ghost:      rgba(6, 78, 59, 0.15);
      }
      [data-color-scheme="medina"][data-theme="dark"] {
        --primary:            #34D399;
        --primary-container:  #10B981;
        --primary-light:      rgba(52, 211, 153, 0.1);
        --on-primary:         #022C22;
        --surface:            #064E3B;
        --surface-low:        #022C22;
        --surface-lowest:     #0F5A47;
        --on-surface:         #ECFDF5;
        --on-surface-variant: #A7F3D0;
        --outline-ghost:      rgba(236, 253, 245, 0.15);
      }
      @media (prefers-color-scheme: dark) {
        [data-color-scheme="medina"]:not([data-theme="light"]) {
          --primary:            #34D399;
          --primary-container:  #10B981;
          --primary-light:      rgba(52, 211, 153, 0.1);
          --on-primary:         #022C22;
          --surface:            #064E3B;
          --surface-low:        #022C22;
          --surface-lowest:     #0F5A47;
          --on-surface:         #ECFDF5;
          --on-surface-variant: #A7F3D0;
          --outline-ghost:      rgba(236, 253, 245, 0.15);
        }
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { -webkit-tap-highlight-color: transparent; }
      body {
        background: var(--surface-low);
        color: var(--on-surface);
        font-family: 'Inter', sans-serif;
      }
      select option { background: var(--surface-lowest); color: var(--on-surface); }

      .uline-input:focus {
        outline: none;
        border-bottom-color: var(--primary-container) !important;
        box-shadow: 0 2px 0 0 var(--primary-container);
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateX(-50%) translateY(14px); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
      }
      @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
      @keyframes pageFade {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0%   { background-position: -600px 0; }
        100% { background-position:  600px 0; }
      }

      button { transition: all 0.3s ease; }
      button:active { opacity: 0.75; }

      ::-webkit-scrollbar { width: 3px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--outline-ghost); border-radius: 2px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
